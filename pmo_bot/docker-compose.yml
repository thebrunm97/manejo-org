version: '3.8'

services:
  wppconnect:
    container_name: wppconnect
    restart: always
    shm_size: '1gb'
    build:
      context: .
      dockerfile: Dockerfile.wppconnect
      args:
        - NODE_ENV=production
    ports:
      - "21465:21465"
    environment:
      - PORT=21465
      # Webhook aponta para o container Go via rede Docker
      - WEBHOOK_URL=http://pmo-bot-go:8080/webhook/wppconnect?token=$${WPPCONNECT_TOKEN}
      - WEBHOOK_ENABLED=true
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_READ_MESSAGES=false
      - WEBHOOK_ALL_EVENTS=true
      - WEBHOOK_IGNORE_BROADCAST=true
      - WEBHOOK_IGNORE_STATUS=true
      - AUTO_READ_MESSAGES=false
      - MARK_MESSAGES_READ=false
      - LOG_LEVEL=silly
      - SECRET_KEY=${WPP_SECRET_KEY}
      - SESSION_SECRET_KEY=${WPP_SECRET_KEY}
      - AUTHENTICATION_TYPE=secret
      - TZ=America/Sao_Paulo
    env_file:
      - .env
    volumes:
      - ./wppconnect-data:/usr/src/wpp-server/userDataDir
      - ./tokens:/usr/src/wpp-server/tokens
      - ./wpp_entrypoint.sh:/entrypoint.sh
    entrypoint: [ "/bin/sh", "/entrypoint.sh" ]
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:21465/api-docs/" ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - pmo-net

  # =========================================================================
  # PMO-Bot-Go — Motor principal (substitui pmo-bot Python + pmo-worker)
  # =========================================================================
  pmo-bot-go:
    container_name: pmo-bot-go
    restart: always
    build:
      context: ../pmo-bot-go
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ../pmo-bot-go/.env
    environment:
      - PORT=8080
      - GIN_MODE=release
      - WPPCONNECT_URL=http://wppconnect:21465
      - TZ=America/Sao_Paulo
    depends_on:
      wppconnect:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--spider", "-q", "http://localhost:8080/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      pmo-net:
        aliases:
          - pmo-bot-go
    hostname: pmo-bot-go

networks:
  pmo-net:
    driver: bridge
