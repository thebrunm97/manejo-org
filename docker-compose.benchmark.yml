services:
  redis:
    image: redis:alpine
    container_name: benchmark-redis
    networks:
      - benchmark-net

  bot-python:
    container_name: bot-python-benchmark
    build:
      context: ./pmo_bot
      dockerfile: Dockerfile
    restart: on-failure
    ports:
      - "5001:5000"
    command: [ "uvicorn", "webhook:app", "--host", "0.0.0.0", "--port", "5000" ]
    env_file:
      - ./pmo_bot/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - WPP_SERVER_URL=http://benchmark-runner:3333
      - WPPCONNECT_URL=http://benchmark-runner:3333
      - PORT=5000
    depends_on:
      - redis
    networks:
      - benchmark-net

  bot-python-worker:
    container_name: bot-python-worker-benchmark
    build:
      context: ./pmo_bot
      dockerfile: Dockerfile
    restart: on-failure
    command: [ "arq", "worker.WorkerSettings" ]
    env_file:
      - ./pmo_bot/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - WPP_SERVER_URL=http://benchmark-runner:3333
      - WPPCONNECT_URL=http://benchmark-runner:3333
    depends_on:
      - redis
    networks:
      - benchmark-net

  bot-go:
    container_name: bot-go-benchmark
    build:
      context: ./pmo-bot-go
      dockerfile: Dockerfile
    restart: on-failure
    ports:
      - "8080:8080"
    env_file:
      - ./pmo-bot-go/.env
    environment:
      - PORT=8080
      - WPPCONNECT_URL=http://benchmark-runner:3333
      - GIN_MODE=release
    networks:
      - benchmark-net

  benchmark-runner:
    container_name: benchmark-runner
    build:
      context: .
      dockerfile: Dockerfile.benchmark
    environment:
      - PYTHON_BOT_URL=http://bot-python:5000
      - GO_BOT_URL=http://bot-go:8080
    ports:
      - "3333:3333"
    networks:
      - benchmark-net

networks:
  benchmark-net:
    driver: bridge
